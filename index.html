<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>태양광 수익 모델 정밀 시뮬레이터</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1a365d; --accent: #ed8936; --success: #38a169; --bg: #f1f5f9; --red: #e53e3e; --blue: #3182ce; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        .wrapper { max-width: 1400px; margin: auto; display: flex; flex-direction: column; gap: 15px; }
        
        /* 상단 모델 선택 탭 */
        .model-tabs { display: flex; gap: 10px; }
        .tab { flex: 1; padding: 18px; background: white; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; text-align: center; transition: 0.3s; }
        .tab.active { border-color: var(--primary); background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(26,54,93,0.15); }
        .tab h4 { margin: 0 0 4px 0; font-size: 16px; }

        .main-grid { display: grid; grid-template-columns: 360px 1fr; gap: 20px; }
        @media (max-width: 1100px) { .main-grid { grid-template-columns: 1fr; } }

        /* 입력창 스타일 */
        .side-panel { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .section-title { font-size: 13px; font-weight: bold; color: var(--primary); margin: 15px 0 8px; border-bottom: 2px solid #f1f5f9; padding-bottom: 5px; }
        .input-group { margin-bottom: 10px; }
        label { display: block; font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 3px; }
        .in-row { display: flex; align-items: center; gap: 8px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        
        .btn-upd { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-pdf { width: 100%; padding: 12px; background: var(--red); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 8px; }

        /* 결과 패널 스타일 */
        .content-panel { display: flex; flex-direction: column; gap: 15px; }
        .summary-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .s-card { background: white; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #e2e8f0; border-top: 5px solid var(--primary); }
        .s-card h5 { margin: 0; font-size: 12px; color: #64748b; }
        .s-card p { margin: 8px 0 0; font-size: 24px; font-weight: 800; color: var(--primary); }

        .chart-box { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; height: 480px; }
        .table-box { background: white; border-radius: 16px; border: 1px solid #e2e8f0; overflow: hidden; }
        .table-scroll { max-height: 400px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        thead { background: #f8fafc; position: sticky; top: 0; z-index: 10; }
        th { padding: 12px; text-align: right; border-bottom: 2px solid #e2e8f0; color: #475569; }
        td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; text-align: right; }
        th:first-child, td:first-child { text-align: center; }
        .txt-sum { font-weight: bold; color: var(--primary); }
        .txt-profit { font-weight: bold; color: var(--success); }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="model-tabs">
        <div class="tab active" id="t1" onclick="changeMode(1)"><h4>🏠 전기절감 + 판매</h4></div>
        <div class="tab" id="t2" onclick="changeMode(2)"><h4>💰 전량 판매</h4></div>
        <div class="tab" id="t3" onclick="changeMode(3)"><h4>🏢 지붕 임대</h4></div>
    </div>

    <div class="main-grid">
        <div class="side-panel">
            <div class="section-title">기본 정보</div>
            <div class="input-group"><label>설치 용량 (kW)</label><input type="number" id="cap" value="100" oninput="autoFinance()"></div>
            <div class="input-group"><label>일평균 발전시간 (h)</label><input type="number" id="genTime" value="3.6" step="0.1"></div>
            <div class="input-group"><label>연 효율 저감율 (%)</label><input type="number" id="deg" value="1.0" step="0.1"></div>

            <div id="finance-ui">
                <div class="section-title">금융 설정 (20:80 자동)</div>
                <div class="input-group"><label>자기자본 (만원)</label><input type="number" id="cash" value="2400"></div>
                <div class="input-group"><label>대출 금액 (만원)</label><input type="number" id="loan" value="9600"></div>
                <div class="input-group"><label>금리 (%) / 기간 (년)</label>
                    <div class="in-row"><input type="number" id="rate" value="1.75" step="0.01"><input type="number" id="period" value="10"></div>
                </div>
            </div>

            <div class="section-title">상세 수익 설정</div>
            <div id="dynamic-inputs"></div>
            <div class="input-group" id="om-ui"><label>연 운영비 (만원)</label><input type="number" id="om" value="150"></div>

            <button class="btn-upd" onclick="calc()">수익 분석 업데이트</button>
            <button class="btn-pdf" onclick="downloadPDF()">PDF 결과 저장</button>
        </div>

        <div class="content-panel">
            <div class="summary-cards">
                <div class="s-card"><h5>20년 누적 총수익</h5><p id="sumRev">-</p></div>
                <div class="s-card"><h5>20년 누적 총비용</h5><p id="sumExp">-</p></div>
                <div class="s-card" style="border-top-color: var(--success);"><h5>20년 실질 순이익</h5><p id="sumNet">-</p></div>
            </div>
            <div class="chart-box"><canvas id="mainChart"></canvas></div>
            <div class="table-box">
                <div class="table-scroll">
                    <table id="resTable">
                        <thead><tr id="theadRow"></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let mode = 1;
let myChart;

function autoFinance() {
    if (mode === 3) return;
    const cap = parseFloat(document.getElementById('cap').value) || 0;
    const total = cap * 120; // kW당 공사비 120만원 가정
    document.getElementById('cash').value = Math.round(total * 0.2);
    document.getElementById('loan').value = Math.round(total * 0.8);
}

function changeMode(m) {
    mode = m;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('t'+m).classList.add('active');
    
    document.getElementById('finance-ui').style.display = (mode === 3) ? 'none' : 'block';
    document.getElementById('om-ui').style.display = (mode === 3) ? 'none' : 'block';
    
    renderInputs();
    calc();
}

function renderInputs() {
    const div = document.getElementById('dynamic-inputs');
    if (mode === 1) {
        div.innerHTML = `
            <div class="input-group"><label>절감 단가 (원/kWh)</label><input type="number" id="savePrice" value="200"></div>
            <div class="input-group"><label>판매 단가 (SMP+REC)</label><input type="number" id="sellPrice" value="195"></div>
            <div class="input-group"><label>자가소비 비율 (%)</label><input type="number" id="selfRatio" value="30"></div>
        `;
    } else if (mode === 2) {
        div.innerHTML = `
            <div class="input-group"><label>가중치 구분</label>
                <select id="weight"><option value="1.5">건물/옥상(1.5)</option><option value="1.2">일반부지(1.2)</option></select>
            </div>
            <div class="input-group"><label>SMP / REC 단가</label><div class="in-row"><input type="number" id="smp" value="120"><input type="number" id="rec" value="75"></div></div>
        `;
    } else {
        div.innerHTML = `<div class="input-group"><label>연 임대료 (원/kW)</label><input type="number" id="rentPrice" value="40000"></div>`;
    }
}

function calc() {
    const v = {
        cap: parseFloat(document.getElementById('cap').value) || 0,
        gen: parseFloat(document.getElementById('genTime').value) || 0,
        deg: (parseFloat(document.getElementById('deg').value) || 0) / 100,
        loan: (parseFloat(document.getElementById('loan').value) || 0) * 10000,
        rate: (parseFloat(document.getElementById('rate').value) || 0) / 100 / 12,
        period: (parseInt(document.getElementById('period').value) || 0) * 12,
        om: (mode === 3) ? 0 : (parseFloat(document.getElementById('om').value) || 0)
    };

    const monRepay = (v.loan > 0 && v.rate > 0) ? (v.loan * v.rate * Math.pow(1 + v.rate, v.period)) / (Math.pow(1 + v.rate, v.period) - 1) : 0;
    const yearRepay = (monRepay * 12) / 10000;

    let labels = [], dataSave = [], dataSell = [], dataNet = [], dataCum = [];
    let tRev = 0, tExp = 0, tNet = 0;
    
    const thead = document.getElementById('theadRow');
    const tbody = document.querySelector('#resTable tbody');
    tbody.innerHTML = '';

    // 테이블 헤더 분기
    let h = `<th>차수</th><th>발전량(kWh)</th>`;
    if (mode === 1) h += `<th>전기절감액</th><th>판매수익</th>`;
    h += `<th>매출합계</th><th>대출상환</th><th>관리비</th><th style="color:var(--success)">순수익</th><th>누적</th>`;
    thead.innerHTML = h;

    for (let i = 1; i <= 20; i++) {
        labels.push(i + '년');
        const annualGen = v.cap * v.gen * 365 * Math.pow(1 - v.deg, i - 1);
        let sRev = 0, pRev = 0, total = 0;

        if (mode === 1) {
            const ratio = (parseFloat(document.getElementById('selfRatio').value) || 0) / 100;
            sRev = (annualGen * ratio * parseFloat(document.getElementById('savePrice').value)) / 10000;
            pRev = (annualGen * (1 - ratio) * parseFloat(document.getElementById('sellPrice').value)) / 10000;
            total = sRev + pRev;
        } else if (mode === 2) {
            const w = parseFloat(document.getElementById('weight').value);
            const smp = parseFloat(document.getElementById('smp').value);
            const rec = parseFloat(document.getElementById('rec').value);
            total = (annualGen * (smp + (rec * w))) / 10000;
            pRev = total;
        } else {
            total = (v.cap * (parseFloat(document.getElementById('rentPrice').value) || 0)) / 10000;
            pRev = total;
        }

        const repay = (i <= (v.period / 12)) ? yearRepay : 0;
        const net = total - repay - v.om;
        
        tRev += total; tExp += (repay + v.om); tNet += net;
        dataSave.push(Math.round(sRev)); dataSell.push(Math.round(pRev)); 
        dataNet.push(Math.round(net)); dataCum.push(Math.round(tNet));

        let r = `<tr><td>${i}년</td><td>${Math.round(annualGen).toLocaleString()}</td>`;
        if (mode === 1) r += `<td>${Math.round(sRev).toLocaleString()}</td><td>${Math.round(pRev).toLocaleString()}</td>`;
        r += `<td class="txt-sum">${Math.round(total).toLocaleString()}</td><td style="color:var(--red)">${Math.round(repay).toLocaleString()}</td><td>${Math.round(v.om)}</td><td class="txt-profit">${Math.round(net).toLocaleString()}</td><td>${Math.round(tNet).toLocaleString()}</td></tr>`;
        tbody.insertAdjacentHTML('beforeend', r);
    }

    document.getElementById('sumRev').innerText = Math.round(tRev).toLocaleString() + " 만원";
    document.getElementById('sumExp').innerText = Math.round(tExp).toLocaleString() + " 만원";
    document.getElementById('sumNet').innerText = Math.round(tNet).toLocaleString() + " 만원";

    drawChart(labels, dataSave, dataSell, dataNet, dataCum);
}

function drawChart(l, ds, dl, dn, dc) {
    const ctx = document.getElementById('mainChart').getContext('2d');
    if (myChart) myChart.destroy();
    
    let datasets = [
        { label: '누적 수익추이', data: dc, type: 'line', borderColor: '#1a365d', backgroundColor: 'rgba(26,54,93,0.1)', fill: true, yAxisID: 'y1', order: 1 },
        { label: '실질 순이익(연)', data: dn, type: 'bar', backgroundColor: '#38a169', yAxisID: 'y', order: 2 }
    ];

    if (mode === 1) {
        datasets.push({ label: '전기료 절감액', data: ds, type: 'bar', backgroundColor: '#ed8936', stack: 'rev', yAxisID: 'y', order: 3 });
        datasets.push({ label: '남은 전기판매', data: dl, type: 'bar', backgroundColor: '#3182ce', stack: 'rev', yAxisID: 'y', order: 3 });
    }

    myChart = new Chart(ctx, {
        data: { labels: l, datasets: datasets },
        options: {
            responsive: true, maintainAspectRatio: false,
            scales: { 
                y: { beginAtZero: true, position: 'left', title: { display: true, text: '연간 수익 (만원)' } },
                y1: { beginAtZero: true, position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: '누적 수익 (만원)' } },
                x: { stacked: true }
            },
            plugins: { tooltip: { mode: 'index' } }
        }
    });
}

function downloadPDF() {
    const opt = { margin: 5, filename: '태양광_수익분석.pdf', html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' } };
    html2pdf().set(opt).from(document.body).save();
}

window.onload = () => { renderInputs(); calc(); };
</script>
</body>
</html>
