<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>태양광 수익 모델 정밀 시뮬레이터</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1a365d; --accent: #ed8936; --success: #38a169; --bg: #f1f5f9; --red: #e53e3e; --blue: #3182ce; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        .wrapper { max-width: 1400px; margin: auto; display: flex; flex-direction: column; gap: 15px; }
        
        /* 탭 스타일 */
        .model-tabs { display: flex; gap: 10px; }
        .tab { flex: 1; padding: 18px; background: white; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; text-align: center; transition: 0.3s; }
        .tab.active { border-color: var(--primary); background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(26,54,93,0.15); }
        .tab h4 { margin: 0 0 4px 0; font-size: 16px; }

        /* 메인 레이아웃 */
        .main-grid { display: grid; grid-template-columns: 340px 1fr; gap: 20px; }
        @media (max-width: 1100px) { .main-grid { grid-template-columns: 1fr; } }

        /* 사이드바 */
        .side-panel { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); height: fit-content; }
        .section-title { font-size: 13px; font-weight: bold; color: var(--primary); margin: 15px 0 8px; border-bottom: 1px solid #f1f5f9; padding-bottom: 5px; }
        .input-group { margin-bottom: 10px; }
        label { display: block; font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 3px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        
        .btn-upd { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-pdf { width: 100%; padding: 12px; background: var(--red); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 8px; }

        /* 결과 영역 */
        .summary-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 15px; }
        .s-card { background: white; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #e2e8f0; border-top: 5px solid var(--primary); }
        .s-card h5 { margin: 0; font-size: 11px; color: #64748b; }
        .s-card p { margin: 5px 0 0; font-size: 18px; font-weight: 800; color: var(--primary); }

        .chart-box { background: white; padding: 15px; border-radius: 16px; border: 1px solid #e2e8f0; height: 400px; margin-bottom: 15px; }
        
        .table-box { background: white; border-radius: 16px; border: 1px solid #e2e8f0; overflow: hidden; }
        .table-scroll { max-height: 500px; overflow-y: auto; } /* 화면에선 스크롤 유지 */
        
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        thead { background: #f8fafc; position: sticky; top: 0; }
        th { padding: 10px; text-align: right; border-bottom: 2px solid #e2e8f0; color: #475569; white-space: nowrap; }
        td { padding: 8px 10px; border-bottom: 1px solid #f1f5f9; text-align: right; }
        th:first-child, td:first-child { text-align: center; }
        .txt-profit { font-weight: bold; color: var(--success); }

        /* [중요] PDF 저장용 스타일 강제 적용 */
        .pdf-mode { width: 1100px !important; padding: 20px !important; background: white !important; }
        .pdf-mode .table-scroll { max-height: none !important; overflow: visible !important; }
        .pdf-mode .side-panel { box-shadow: none !important; border: 1px solid #eee !important; }
    </style>
</head>
<body>

<div class="wrapper" id="main-content">
    <div class="model-tabs">
        <div class="tab active" id="t1" onclick="changeMode(1)"><h4>🏠 전기절감 + 판매</h4></div>
        <div class="tab" id="t2" onclick="changeMode(2)"><h4>💰 전량 판매</h4></div>
        <div class="tab" id="t3" onclick="changeMode(3)"><h4>🏢 지붕 임대</h4></div>
    </div>

    <div class="main-grid">
        <div class="side-panel">
            <div class="section-title">기본 정보</div>
            <div class="input-group"><label>설치 용량 (kW)</label><input type="number" id="cap" value="100" oninput="autoFinance()"></div>
            <div class="input-group" id="gen-ui"><label>일평균 발전시간 (h)</label><input type="number" id="genTime" value="3.6" step="0.1"></div>
            <div class="input-group" id="deg-ui"><label>연 효율 저감율 (%)</label><input type="number" id="deg" value="1.0" step="0.1"></div>

            <div id="finance-ui">
                <div class="section-title">투자 및 금융 (20:80 자동)</div>
                <div class="input-group"><label>자기자본 (만원)</label><input type="number" id="cash" value="2400"></div>
                <div class="input-group"><label>대출 금액 (만원)</label><input type="number" id="loan" value="9600"></div>
                <div class="input-group"><label>금리 (%) / 기간 (년)</label>
                    <div style="display:flex; gap:8px;"><input type="number" id="rate" value="1.75" step="0.01"><input type="number" id="period" value="10"></div>
                </div>
            </div>

            <div class="section-title">상세 수익 설정</div>
            <div id="dynamic-inputs"></div>
            <div class="input-group" id="om-ui"><label>연 운영비 (만원)</label><input type="number" id="om" value="150"></div>

            <button class="btn-upd" onclick="calc()">수익 분석 업데이트</button>
            <button class="btn-pdf" onclick="downloadPDF()">PDF 결과 저장</button>
        </div>

        <div class="content-panel">
            <div class="summary-cards">
                <div class="s-card"><h5>20년 누적 총매출</h5><p id="sumRev">-</p></div>
                <div class="s-card" id="exp-card"><h5>20년 누적 총비용</h5><p id="sumExp">-</p></div>
                <div class="s-card" style="border-top-color: var(--success);"><h5>20년 예상 순이익</h5><p id="sumNet">-</p></div>
            </div>
            <div class="chart-box"><canvas id="mainChart"></canvas></div>
            <div class="table-box">
                <div class="table-scroll" id="table-scroll-area">
                    <table id="resTable">
                        <thead><tr id="theadRow"></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let mode = 1;
let myChart;

function autoFinance() {
    if (mode === 3) return;
    const cap = parseFloat(document.getElementById('cap').value) || 0;
    document.getElementById('cash').value = Math.round((cap * 120) * 0.2);
    document.getElementById('loan').value = Math.round((cap * 120) * 0.8);
}

function changeMode(m) {
    mode = m;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('t'+m).classList.add('active');
    const isRental = (mode === 3);
    document.getElementById('finance-ui').style.display = isRental ? 'none' : 'block';
    document.getElementById('om-ui').style.display = isRental ? 'none' : 'block';
    document.getElementById('gen-ui').style.display = isRental ? 'none' : 'block';
    document.getElementById('deg-ui').style.display = isRental ? 'none' : 'block';
    document.getElementById('exp-card').style.visibility = isRental ? 'hidden' : 'visible';
    renderInputs();
    calc();
}

function renderInputs() {
    const div = document.getElementById('dynamic-inputs');
    if (mode === 1) {
        div.innerHTML = `<div class="input-group"><label>절감 단가 (원/kWh)</label><input type="number" id="savePrice" value="200"></div>
                         <div class="input-group"><label>판매 단가 (SMP+REC)</label><input type="number" id="sellPrice" value="195"></div>
                         <div class="input-group"><label>자가소비 비율 (%)</label><input type="number" id="selfRatio" value="30"></div>`;
    } else if (mode === 2) {
        div.innerHTML = `<div class="input-group"><label>가중치 구분</label><select id="weight"><option value="1.5">건물/옥상(1.5)</option><option value="1.2">일반부지(1.2)</option><option value="1.0">임야(1.0)</option></select></div>
                         <div class="input-group"><label>SMP / REC 단가</label><div style="display:flex; gap:8px;"><input type="number" id="smp" value="120"><input type="number" id="rec" value="75"></div></div>`;
    } else {
        div.innerHTML = `<div class="input-group"><label>연 임대료 (원/kW)</label><input type="number" id="rentPrice" value="40000"></div>`;
    }
}

function calc() {
    const v = {
        cap: parseFloat(document.getElementById('cap').value) || 0,
        gen: parseFloat(document.getElementById('genTime').value) || 0,
        deg: (parseFloat(document.getElementById('deg').value) || 0) / 100,
        loan: (parseFloat(document.getElementById('loan').value) || 0) * 10000,
        rate: (parseFloat(document.getElementById('rate').value) || 0) / 100 / 12,
        period: (parseInt(document.getElementById('period').value) || 0) * 12,
        om: (mode === 3) ? 0 : (parseFloat(document.getElementById('om').value) || 0)
    };

    const monRepay = (v.loan > 0 && v.rate > 0) ? (v.loan * v.rate * Math.pow(1 + v.rate, v.period)) / (Math.pow(1 + v.rate, v.period) - 1) : 0;
    const yearRepay = (monRepay * 12) / 10000;

    let labels = [], dataSave = [], dataSell = [], dataCum = [], dataCumSave = [], dataCumSell = [];
    let tTotalRev = 0, tExp = 0, tNet = 0, tCumSave = 0, tCumSell = 0;
    
    const thead = document.getElementById('theadRow');
    const tbody = document.querySelector('#resTable tbody');
    tbody.innerHTML = '';

    if (mode === 3) {
        thead.innerHTML = `<th>차수</th><th>설치용량(kW)</th><th>단가(원)</th><th>연간 수익</th><th>누적수익</th>`;
    } else {
        let h = `<th>차수</th><th>발전량(kWh)</th>`;
        if (mode === 1) h += `<th>절감액</th><th>판매액</th>`;
        h += `<th>매출합계</th><th>대출상환</th><th>관리비</th><th>순수익</th><th>누적순익</th>`;
        thead.innerHTML = h;
    }

    for (let i = 1; i <= 20; i++) {
        labels.push(i + '년');
        let annualGen = v.cap * v.gen * 365 * Math.pow(1 - v.deg, i - 1);
        let sRev = 0, pRev = 0, total = 0, repay = 0;

        if (mode === 1) {
            const ratio = (parseFloat(document.getElementById('selfRatio').value) || 0) / 100;
            sRev = (annualGen * ratio * parseFloat(document.getElementById('savePrice').value)) / 10000;
            pRev = (annualGen * (1 - ratio) * parseFloat(document.getElementById('sellPrice').value)) / 10000;
            total = sRev + pRev;
            repay = (i <= (v.period / 12)) ? yearRepay : 0;
            tCumSave += sRev; tCumSell += pRev;
        } else if (mode === 2) {
            const w = parseFloat(document.getElementById('weight').value);
            total = (annualGen * (parseFloat(document.getElementById('smp').value) + (parseFloat(document.getElementById('rec').value) * w))) / 10000;
            pRev = total;
            repay = (i <= (v.period / 12)) ? yearRepay : 0;
        } else {
            total = (v.cap * (parseFloat(document.getElementById('rentPrice').value) || 40000)) / 10000;
            pRev = total;
            repay = 0;
        }

        const net = total - repay - v.om;
        tTotalRev += total; tExp += (repay + v.om); tNet += net;
        dataSave.push(Math.round(sRev)); dataSell.push(Math.round(pRev)); 
        dataCum.push(Math.round(tTotalRev)); dataCumSave.push(Math.round(tCumSave)); dataCumSell.push(Math.round(tCumSell));

        if (mode === 3) {
            tbody.insertAdjacentHTML('beforeend', `<tr><td>${i}</td><td>${v.cap}</td><td>${(document.getElementById('rentPrice').value || 40000).toLocaleString()}</td><td>${Math.round(total).toLocaleString()}</td><td class="txt-profit">${Math.round(tNet).toLocaleString()}</td></tr>`);
        } else {
            let r = `<tr><td>${i}</td><td>${Math.round(annualGen).toLocaleString()}</td>`;
            if (mode === 1) r += `<td>${Math.round(sRev).toLocaleString()}</td><td>${Math.round(pRev).toLocaleString()}</td>`;
            r += `<td>${Math.round(total).toLocaleString()}</td><td>${Math.round(repay).toLocaleString()}</td><td>${v.om}</td><td class="txt-profit">${Math.round(net).toLocaleString()}</td><td>${Math.round(tNet).toLocaleString()}</td></tr>`;
            tbody.insertAdjacentHTML('beforeend', r);
        }
    }

    document.getElementById('sumRev').innerText = Math.round(tTotalRev).toLocaleString() + "만";
    document.getElementById('sumExp').innerText = Math.round(tExp).toLocaleString() + "만";
    document.getElementById('sumNet').innerText = Math.round(tNet).toLocaleString() + "만";

    drawChart(labels, dataSave, dataSell, dataCum, dataCumSave, dataCumSell);
}

function drawChart(l, ds, dl, dc, dcs, dcl) {
    const ctx = document.getElementById('mainChart').getContext('2d');
    if (myChart) myChart.destroy();
    let datasets = [{ label: '누적 매출합계', data: dc, type: 'line', borderColor: '#1a365d', backgroundColor: 'rgba(26,54,93,0.1)', borderWidth: 3, fill: true, order: 1 }];
    if (mode === 1) {
        datasets.push({ label: '누적 절감액', data: dcs, type: 'line', borderColor: '#ed8936', borderDash: [5, 5], fill: false, order: 2 });
        datasets.push({ label: '누적 판매액', data: dcl, type: 'line', borderColor: '#3182ce', borderDash: [5, 5], fill: false, order: 2 });
        datasets.push({ label: '연간 절감액', data: ds, type: 'bar', backgroundColor: 'rgba(237, 137, 54, 0.4)', stack: 'rev', order: 3 });
        datasets.push({ label: '연간 판매액', data: dl, type: 'bar', backgroundColor: 'rgba(49, 130, 206, 0.4)', stack: 'rev', order: 3 });
    } else {
        datasets.push({ label: '연간 수익(만원)', data: dl, type: 'bar', backgroundColor: '#38a169', order: 2 });
    }
    myChart = new Chart(ctx, { data: { labels: l, datasets: datasets }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true }, x: { stacked: true } } } });
}

function downloadPDF() {
    const element = document.getElementById('main-content');
    const originalStyle = element.style.cssText;
    
    // PDF용 임시 스타일 강제 적용
    element.classList.add('pdf-mode');
    
    const opt = {
        margin: [10, 10],
        filename: '태양광_수익분석_리포트.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, letterRendering: true },
        jsPDF: { unit: 'mm', format: 'a3', orientation: 'landscape' } // 가로형 A3로 넉넉하게 배치
    };

    html2pdf().set(opt).from(element).save().then(() => {
        element.classList.remove('pdf-mode'); // 출력 후 원래대로 복구
    });
}

window.onload = () => { renderInputs(); calc(); };
</script>
</body>
</html>
