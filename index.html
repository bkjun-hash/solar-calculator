<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>태양광 수익 계산기</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f9; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; }
        .btn { width: 100%; padding: 15px; background: #2c3e50; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .result-box { display: flex; gap: 20px; margin-top: 20px; }
        .card { flex: 1; padding: 20px; border-radius: 10px; color: white; text-align: center; }
        .blue { background: #3498db; } .green { background: #27ae60; }
    </style>
</head>
<body>
    <div class="container">
        <h2>☀️ 옥상 태양광 20년 수익 시뮬레이터</h2>
        <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px;">
            <div>
                <label>설치 용량 (kW)</label>
                <input type="number" id="cap" value="100">
                <label>대출 금리 (%)</label>
                <input type="number" id="loan" value="1.75" step="0.01">
                <button class="btn" onclick="update()">수익 시뮬레이션 실행</button>
            </div>
            <div>
                <div class="result-box">
                    <div class="card blue"><h4>자가소비 20년</h4><p id="res1">-</p></div>
                    <div class="card green"><h4>상업판매 20년</h4><p id="res2">-</p></div>
                </div>
                <canvas id="myChart" style="margin-top:20px;"></canvas>
            </div>
        </div>
    </div>
    <script>
        let chart;
        function update() {
            const cap = document.getElementById('cap').value;
            const loan = document.getElementById('loan').value;
            let d1 = [], d2 = [], labels = [];
            for(let i=1; i<=20; i++) {
                labels.push(i+'년차');
                let gen = cap * 3.6 * 365 * Math.pow(0.993, i-1);
                let val1 = (gen*0.7*200/10000)+(gen*0.3*103/10000) - (i<=10?1051:0) - 150;
                let val2 = (gen*209.5/10000) - (i<=10?1051:0) - 150;
                d1.push(Math.round(val1)); d2.push(Math.round(val2));
            }
            document.getElementById('res1').innerText = d1.reduce((a,b)=>a+b).toLocaleString() + "만원";
            document.getElementById('res2').innerText = d2.reduce((a,b)=>a+b).toLocaleString() + "만원";
            const ctx = document.getElementById('myChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, { type: 'line', data: { labels: labels, datasets: [
                { label: '자가소비(7:3)', data: d1, borderColor: '#3498db', fill: false },
                { label: '상업판매(100%)', data: d2, borderColor: '#27ae60', fill: false }
            ]}});
        }
        window.onload = update;
    </script>
</body>
</html>
