<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>태양광 수익 모델 정밀 분석기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1a365d; --accent: #ed8936; --success: #38a169; --bg: #f1f5f9; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #334155; }
        .wrapper { max-width: 1400px; margin: auto; display: flex; flex-direction: column; gap: 20px; }
        
        /* 상단 탭 */
        .model-tabs { display: flex; gap: 10px; }
        .tab { flex: 1; padding: 15px; background: white; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; text-align: center; transition: 0.3s; }
        .tab.active { border-color: var(--primary); background: var(--primary); color: white; }
        .tab h4 { margin: 0; font-size: 16px; }

        .main-grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        @media (max-width: 1100px) { .main-grid { grid-template-columns: 1fr; } }

        /* 입력창 */
        .side-panel { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .section-title { font-size: 14px; font-weight: bold; color: var(--primary); margin: 15px 0 10px; border-bottom: 1px solid #edf2f7; padding-bottom: 5px; }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 4px; }
        .in-row { display: flex; align-items: center; gap: 8px; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        .unit { font-size: 11px; color: #94a3b8; width: 35px; }

        .btn-upd { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-pdf { width: 100%; padding: 12px; background: #ef4444; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* 결과창 */
        .content-panel { display: flex; flex-direction: column; gap: 20px; }
        .summary-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .s-card { background: white; padding: 20px; border-radius: 12px; border-top: 5px solid var(--primary); text-align: center; border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; border-left: 1px solid #e2e8f0; }
        .s-card h5 { margin: 0; font-size: 13px; color: #64748b; }
        .s-card p { margin: 8px 0 0; font-size: 20px; font-weight: 800; color: var(--primary); }

        .chart-box { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; height: 450px; }
        .table-box { background: white; border-radius: 16px; border: 1px solid #e2e8f0; overflow: hidden; }
        .table-scroll { max-height: 400px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        thead { background: #f8fafc; position: sticky; top: 0; z-index: 10; }
        th { padding: 12px; text-align: right; border-bottom: 2px solid #e2e8f0; color: #475569; }
        td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; text-align: right; }
        th:first-child, td:first-child { text-align: center; }
        .txt-success { color: var(--success); font-weight: bold; }
        .txt-red { color: #ef4444; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="model-tabs">
        <div class="tab active" id="t1" onclick="changeMode(1)"><h4>🏠 전기절감 + 판매</h4></div>
        <div class="tab" id="t2" onclick="changeMode(2)"><h4>💰 전량 판매</h4></div>
        <div class="tab" id="t3" onclick="changeMode(3)"><h4>🏢 지붕 임대</h4></div>
    </div>

    <div class="main-grid">
        <div class="side-panel">
            <div class="section-title">기본 시스템 정보</div>
            <div class="input-group"><label>설치 용량 (kW)</label><input type="number" id="cap" value="100"></div>
            <div class="input-group"><label>일평균 발전시간 (h)</label><input type="number" id="genTime" value="3.6" step="0.1"></div>
            <div class="input-group"><label>연 효율 저감율 (%)</label><input type="number" id="deg" value="1.0" step="0.1"></div>

            <div class="section-title">투자 및 금융</div>
            <div class="input-group"><label>자기자본 (만원)</label><input type="number" id="cash" value="2400"></div>
            <div class="input-group"><label>대출금액 (만원)</label><input type="number" id="loan" value="9600"></div>
            <div class="input-group"><label>금리 (%) / 기간 (년)</label>
                <div class="in-row"><input type="number" id="rate" value="1.75" step="0.01"><input type="number" id="period" value="10"></div>
            </div>

            <div class="section-title">수익/지출 지표</div>
            <div id="mode-inputs">
                </div>
            <div class="input-group"><label>연 운영비 (O&M/만원)</label><input type="number" id="om" value="150"></div>

            <button class="btn-upd" onclick="calculate()">분석 업데이트</button>
            <button class="btn-pdf" onclick="downloadPDF()">보고서 PDF 저장</button>
        </div>

        <div class="content-panel">
            <div class="summary-cards">
                <div class="s-card"><h5>20년 누적 매출</h5><p id="sumRev">-</p></div>
                <div class="s-card"><h5>20년 누적 지출</h5><p id="sumExp">-</p></div>
                <div class="s-card" style="border-top-color: var(--success);"><h5>20년 누적 순수익</h5><p id="sumNet">-</p></div>
            </div>

            <div class="chart-box"><canvas id="mainChart"></canvas></div>

            <div class="table-box">
                <div class="table-scroll">
                    <table id="resTable">
                        <thead>
                            <tr id="tableHeader">
                                </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let mode = 1;
let myChart;

function changeMode(m) {
    mode = m;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('t'+m).classList.add('active');
    renderInputs();
    calculate();
}

function renderInputs() {
    const container = document.getElementById('mode-inputs');
    if (mode === 1) { // 전기절감 + 판매
        container.innerHTML = `
            <div class="input-group"><label>절감 단가 (원/kWh)</label><input type="number" id="savePrice" value="200"></div>
            <div class="input-group"><label>판매 단가 (SMP/REC)</label><div class="in-row"><input type="number" id="smp" value="120"><input type="number" id="rec" value="75"></div></div>
            <div class="input-group"><label>자가소비 비율 (%)</label><input type="number" id="selfRatio" value="30"></div>
            <div class="input-group"><label>REC 가중치</label><input type="number" id="weight" value="1.2" step="0.1"></div>
        `;
    } else if (mode === 2) { // 전량 판매
        container.innerHTML = `
            <div class="input-group"><label>판매 단가 (SMP / REC)</label><div class="in-row"><input type="number" id="smp" value="120"><input type="number" id="rec" value="75"></div></div>
            <div class="input-group"><label>REC 가중치</label><input type="number" id="weight" value="1.2" step="0.1"></div>
        `;
    } else if (mode === 3) { // 지붕 임대
        container.innerHTML = `
            <div class="input-group"><label>임대료 (원/kW)</label><input type="number" id="rentPrice" value="40000"></div>
        `;
    }
}

function calculate() {
    const v = {
        cap: parseFloat(document.getElementById('cap').value),
        genTime: parseFloat(document.getElementById('genTime').value),
        deg: parseFloat(document.getElementById('deg').value) / 100,
        loan: parseFloat(document.getElementById('loan').value) * 10000,
        rate: parseFloat(document.getElementById('rate').value) / 100 / 12,
        period: parseInt(document.getElementById('period').value) * 12,
        om: parseFloat(document.getElementById('om').value)
    };

    // 원리금 균등상환
    const monthlyRepay = (v.loan > 0) ? (v.loan * v.rate * Math.pow(1 + v.rate, v.period)) / (Math.pow(1 + v.rate, v.period) - 1) : 0;
    const yearlyRepay = (monthlyRepay * 12) / 10000;

    let labels = [], revs = [], nets = [], cumNets = [];
    let tRev = 0, tExp = 0, tNet = 0;
    
    const thead = document.getElementById('tableHeader');
    const tbody = document.querySelector('#resTable tbody');
    tbody.innerHTML = '';

    // 헤더 설정
    let headerHtml = `<th>차수</th><th>발전량(kWh)</th>`;
    if (mode === 1) headerHtml += `<th>절감액</th><th>판매수익</th>`;
    headerHtml += `<th>매출합계</th><th>상환액</th><th>운영비</th><th>순수익</th><th>누적</th>`;
    thead.innerHTML = headerHtml;

    for (let i = 1; i <= 20; i++) {
        labels.push(i + '년');
        const yearlyGen = v.cap * v.genTime * 365 * Math.pow(1 - v.deg, i - 1);
        let revVal = 0, saveVal = 0, sellVal = 0;

        if (mode === 1) {
            const selfRatio = parseFloat(document.getElementById('selfRatio').value) / 100;
            const savePrice = parseFloat(document.getElementById('savePrice').value);
            const smp = parseFloat(document.getElementById('smp').value);
            const rec = parseFloat(document.getElementById('rec').value);
            const weight = parseFloat(document.getElementById('weight').value);
            
            saveVal = (yearlyGen * selfRatio * savePrice) / 10000;
            sellVal = (yearlyGen * (1 - selfRatio) * (smp + (rec * weight))) / 10000;
            revVal = saveVal + sellVal;
        } else if (mode === 2) {
            const smp = parseFloat(document.getElementById('smp').value);
            const rec = parseFloat(document.getElementById('rec').value);
            const weight = parseFloat(document.getElementById('weight').value);
            revVal = (yearlyGen * (smp + (rec * weight))) / 10000;
        } else {
            const rentPrice = parseFloat(document.getElementById('rentPrice').value);
            revVal = (v.cap * rentPrice) / 10000;
        }

        const repay = (i <= (v.period / 12)) ? yearlyRepay : 0;
        const netProfit = revVal - repay - v.om;
        tRev += revVal; tExp += (repay + v.om); tNet += netProfit;

        revs.push(Math.round(revVal)); nets.push(Math.round(netProfit)); cumNets.push(Math.round(tNet));

        let row = `<tr><td>${i}년</td><td>${Math.round(yearlyGen).toLocaleString()}</td>`;
        if (mode === 1) row += `<td>${Math.round(saveVal).toLocaleString()}</td><td>${Math.round(sellVal).toLocaleString()}</td>`;
        row += `<td>${Math.round(revVal).toLocaleString()}</td><td class="txt-red">${Math.round(repay).toLocaleString()}</td><td>${Math.round(v.om)}</td><td class="txt-success">${Math.round(netProfit).toLocaleString()}</td><td>${Math.round(tNet).toLocaleString()}</td></tr>`;
        tbody.insertAdjacentHTML('beforeend', row);
    }

    document.getElementById('sumRev').innerText = Math.round(tRev).toLocaleString() + " 만원";
    document.getElementById('sumExp').innerText = Math.round(tExp).toLocaleString() + " 만원";
    document.getElementById('sumNet').innerText = Math.round(tNet).toLocaleString() + " 만원";

    drawChart(labels, revs, nets, cumNets);
}

function drawChart(l, r, n, c) {
    const ctx = document.getElementById('mainChart').getContext('2d');
    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: l,
            datasets: [
                { label: '누적 수익', data: c, type: 'bar', backgroundColor: 'rgba(26, 54, 93, 0.1)', borderColor: '#1a365d', borderWidth: 1, order: 2 },
                { label: '연간 순수익', data: n, borderColor: '#38a169', tension: 0.3, fill: false, order: 1 }
            ]
        },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
    });
}

function downloadPDF() {
    const element = document.body;
    const opt = { margin: 5, filename: '태양광_수익분석_보고서.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' } };
    html2pdf().set(opt).from(element).save();
}

window.onload = () => { renderInputs(); calculate(); };
</script>

</body>
</html>
