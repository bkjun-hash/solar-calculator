<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>태양광 사업 모델 시뮬레이터</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1a365d; --accent: #ed8936; --success: #38a169; --bg: #f8fafc; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        
        /* 레이아웃 최적화 */
        .wrapper { max-width: 1400px; margin: auto; display: flex; flex-direction: column; gap: 20px; }
        
        /* 사업 모델 선택 탭 */
        .model-tabs { display: flex; gap: 10px; margin-bottom: 5px; }
        .tab { flex: 1; padding: 20px; background: white; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; text-align: center; transition: 0.3s; }
        .tab:hover { border-color: var(--primary); }
        .tab.active { border-color: var(--primary); background: var(--primary); color: white; }
        .tab h4 { margin: 0 0 5px 0; font-size: 16px; }
        .tab p { margin: 0; font-size: 12px; opacity: 0.8; }

        .main-container { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
        
        /* 왼쪽 입력창 */
        .side-panel { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); height: fit-content; border: 1px solid #e2e8f0; }
        .group-title { font-size: 14px; font-weight: bold; color: var(--primary); margin: 15px 0 10px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .input-item { margin-bottom: 12px; }
        label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: #64748b; }
        .in-row { display: flex; align-items: center; gap: 5px; }
        input { width: 100%; padding: 8px 12px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 14px; }
        
        .btn-box { display: flex; gap: 8px; margin-top: 20px; }
        .btn-upd { flex: 2; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-pdf { flex: 1; background: #ef4444; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* 오른쪽 결과창 */
        .content-panel { display: flex; flex-direction: column; gap: 20px; }
        
        .stat-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center; }
        .stat-card.res { border-top: 5px solid var(--accent); }
        .stat-card h5 { margin: 0; font-size: 13px; color: #64748b; }
        .stat-card span { display: block; margin-top: 8px; font-size: 22px; font-weight: 800; color: var(--primary); }

        .chart-section { background: white; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; height: 400px; }
        
        /* 표를 한눈에 들어오게 축소 */
        .table-section { background: white; border-radius: 15px; border: 1px solid #e2e8f0; overflow: hidden; }
        .table-wrap { max-height: 350px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        thead { background: #f1f5f9; position: sticky; top: 0; }
        th { padding: 10px; text-align: right; border-bottom: 2px solid #e2e8f0; color: #475569; }
        th:first-child, td:first-child { text-align: center; }
        td { padding: 8px 10px; border-bottom: 1px solid #f1f5f9; text-align: right; }
        .high { font-weight: bold; color: var(--success); }
        .minus { color: #ef4444; }

        @media (max-width: 1000px) { .main-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="model-tabs">
        <div class="tab active" id="tab1" onclick="setModel(1)">
            <h4>🏠 전기절감 + 판매</h4>
            <p>자가소비 후 남는 전력 판매</p>
        </div>
        <div class="tab" id="tab2" onclick="setModel(2)">
            <h4>💰 전량 판매</h4>
            <p>생산 전력 모두 판매 (SMP+REC)</p>
        </div>
        <div class="tab" id="tab3" onclick="setModel(3)">
            <h4>🏢 지붕 임대</h4>
            <p>지붕 대여 및 임대 수익 수취</p>
        </div>
    </div>

    <div class="main-container">
        <div class="side-panel">
            <div class="group-title">기본 발전 설정</div>
            <div class="input-item"><label>설치 용량 (kW)</label><input type="number" id="cap" value="100"></div>
            <div class="input-item"><label>발전시간 (시간/일)</label><input type="number" id="genTime" value="3.6" step="0.1"></div>
            <div class="input-item"><label>효율 저감 (%)</label><input type="number" id="deg" value="0.7" step="0.1"></div>
            
            <div class="group-title">금융 및 투자</div>
            <div class="input-item"><label>자기자본 (만원)</label><input type="number" id="cash" value="2400"></div>
            <div class="input-item"><label>대출금 (만원)</label><input type="number" id="loan" value="9600"></div>
            <div class="input-item"><label>금리(%) / 기간(년)</label>
                <div class="in-row"><input type="number" id="rate" value="1.75" step="0.01"><input type="number" id="period" value="10"></div>
            </div>

            <div class="group-title">수익 변수</div>
            <div class="input-item"><label>SMP / REC 단가</label>
                <div class="in-row"><input type="number" id="smp" value="120"><input type="number" id="rec" value="75"></div>
            </div>
            <div class="input-item"><label>가중치 / 운영비(만원)</label>
                <div class="in-row"><input type="number" id="weight" value="1.2" step="0.1"><input type="number" id="om" value="150"></div>
            </div>

            <div class="btn-box">
                <button class="btn-upd" onclick="calc()">업데이트</button>
                <button class="btn-pdf" onclick="savePdf()">PDF</button>
            </div>
        </div>

        <div class="content-panel">
            <div class="stat-cards">
                <div class="stat-card res"><h5>20년 총 매출</h5><span id="resRev">-</span></div>
                <div class="stat-card res"><h5>20년 총 지출</h5><span id="resExp">-</span></div>
                <div class="stat-card res" style="border-top-color: var(--success);"><h5>20년 누적 순수익</h5><span id="resNet">-</span></div>
            </div>

            <div class="chart-section"><canvas id="mainChart"></canvas></div>

            <div class="table-section">
                <div class="table-wrap">
                    <table id="dataTable">
                        <thead>
                            <tr>
                                <th>차수</th><th>발전량(kWh)</th><th>매출액</th><th>상환액</th><th>운영비</th><th style="color:var(--success)">순수익</th><th>누적수익</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let currentModel = 1;
let myChart;

function setModel(m) {
    currentModel = m;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab' + m).classList.add('active');
    
    // 모델별 기본값 자동 세팅 (예시)
    if(m === 3) { // 임대 모델인 경우 대출/투자비 0으로 가정 등 조정 가능
        document.getElementById('loan').value = 0;
        document.getElementById('cash').value = 0;
        document.getElementById('om').value = 0;
        document.getElementById('smp').value = 0; // 임대료로 대체 계산 로직 필요 시 수정
    } else {
        document.getElementById('loan').value = 9600;
        document.getElementById('cash').value = 2400;
        document.getElementById('om').value = 150;
        document.getElementById('smp').value = 120;
    }
    calc();
}

function calc() {
    const v = {
        cap: parseFloat(document.getElementById('cap').value),
        gen: parseFloat(document.getElementById('genTime').value),
        deg: parseFloat(document.getElementById('deg').value) / 100,
        loan: parseFloat(document.getElementById('loan').value) * 10000,
        rate: parseFloat(document.getElementById('rate').value) / 100 / 12,
        period: parseInt(document.getElementById('period').value) * 12,
        smp: parseFloat(document.getElementById('smp').value),
        rec: parseFloat(document.getElementById('rec').value),
        weight: parseFloat(document.getElementById('weight').value),
        om: parseFloat(document.getElementById('om').value)
    };

    const monRepay = (v.loan > 0) ? (v.loan * v.rate * Math.pow(1 + v.rate, v.period)) / (Math.pow(1 + v.rate, v.period) - 1) : 0;
    const yearRepay = (monRepay * 12) / 10000;

    let labels = [], revs = [], nets = [], cumNets = [];
    let tRev = 0, tExp = 0, tNet = 0;
    const tbody = document.querySelector('#dataTable tbody');
    tbody.innerHTML = '';

    for (let i = 1; i <= 20; i++) {
        labels.push(i + '년');
        const annualGen = v.cap * v.gen * 365 * Math.pow(1 - v.deg, i - 1);
        
        let revTotal = (annualGen * v.smp / 10000) + (annualGen * v.rec * v.weight / 10000);
        // 임대 모델(3)일 경우의 단순 계산 (예: kW당 3만원)
        if(currentModel === 3) revTotal = v.cap * 3.5; 

        const repay = (i <= (v.period / 12)) ? yearRepay : 0;
        const netProfit = revTotal - repay - v.om;
        
        tRev += revTotal; tExp += (repay + v.om); tNet += netProfit;
        revs.push(Math.round(revTotal)); nets.push(Math.round(netProfit)); cumNets.push(Math.round(tNet));

        tbody.insertAdjacentHTML('beforeend', `
            <tr>
                <td>${i}년</td>
                <td>${Math.round(annualGen).toLocaleString()}</td>
                <td>${Math.round(revTotal).toLocaleString()}</td>
                <td class="minus">${Math.round(repay).toLocaleString()}</td>
                <td>${Math.round(v.om)}</td>
                <td class="high">${Math.round(netProfit).toLocaleString()}</td>
                <td>${Math.round(tNet).toLocaleString()}</td>
            </tr>
        `);
    }

    document.getElementById('resRev').innerText = Math.round(tRev).toLocaleString() + " 만원";
    document.getElementById('resExp').innerText = Math.round(tExp).toLocaleString() + " 만원";
    document.getElementById('resNet').innerText = Math.round(tNet).toLocaleString() + " 만원";

    updateChart(labels, revs, nets, cumNets);
}

function updateChart(l, r, n, c) {
    const ctx = document.getElementById('mainChart').getContext('2d');
    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: l,
            datasets: [
                { label: '누적수익', data: c, type: 'bar', backgroundColor: 'rgba(56, 161, 105, 0.1)', borderColor: '#38a169', borderWidth: 1, order: 2 },
                { label: '연 순수익', data: n, borderColor: '#ed8936', tension: 0.3, fill: false, order: 1 }
            ]
        },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
    });
}

function savePdf() {
    const element = document.body;
    const opt = { margin: 5, filename: '태양광분석.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' } };
    html2pdf().set(opt).from(element).save();
}

window.onload = () => calc();
</script>

</body>
</html>
